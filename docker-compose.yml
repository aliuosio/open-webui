services:
  
  ollama:
    container_name: ${NAMESPACE}_ollama
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}
    pull_policy: always
    tty: true
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
     # - NVIDIA_VISIBLE_DEVICES=all  # Make all GPUs available to the container (can be customized)
    volumes:
      - ~/.ollama:/root/.ollama
    # deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        - driver: nvidia
    #          count: 1
    #          capabilities: [gpu]

  webui:
    container_name: ${NAMESPACE}_webui
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-latest}
    volumes:
      - webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

  python:
    container_name: ${NAMESPACE}_python
    image: osioaliu/python:${PY_VERSION}
#    build:
#      context: .docker/python
#      args:
#        PY_VERSION: ${PY_VERSION}
    working_dir: /usr/src/
    command: >
        bash -c "pip install --root-user-action=ignore -r requirements.txt &&
        tail -f /dev/null"
    volumes:
      - ./src:/usr/src
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  webui: {}
