services:
  
  ollama:
    container_name: ${NAMESPACE}_ollama
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}
    pull_policy: always
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - NVIDIA_VISIBLE_DEVICES=all
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    volumes:
      - ollama:/root/.ollama
   
  webui:
    container_name: ${NAMESPACE}_webui
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-cuda}
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    environment:
      - 'OLLAMA_BASE_URL=${OLLAMA_BASE_URL}'
      - NVIDIA_VISIBLE_DEVICES=all
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    volumes:
      - webui:/app/backend/data

  python:
    container_name: ${NAMESPACE}_python
    image: osioaliu/python:${PY_VERSION}
    #build:
    #  context: .docker/python
    #  args:
    #    PY_VERSION: ${PY_VERSION}
    working_dir: /usr/src/
    volumes:
      - ./src:/usr/src
    command: >
      bash -c "if [ -f 'requirements.txt' ]; then
                pip install --root-user-action=ignore -r requirements.txt;
              fi;
              tail -f /dev/null"

  watchtower:
    container_name: ${NAMESPACE}_watchtower
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TZ}
    command: --interval 3600 --cleanup  

volumes:
  webui:
  ollama:

